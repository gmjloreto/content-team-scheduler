<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="Escala das Mídias - GMJ Loreto">
  <meta property="og:description" content="Se inscreva nos eventos de mídia da semana!">
  <meta property="og:image" content="https://gmjloreto.github.io/content-team-scheduler/assets/images/gmj_og_edit.png">
  <meta property="og:url" content="https://gmjloreto.github.io/content-team-scheduler/">
  <meta property="og:type" content="website">

  <link rel="icon" href="../assets/icons/favicon_edit.svg" type="image/svg+xml">
  <title>Escala GMJ - Editor</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin">

<div id="login">
  <h2>Login 🔐</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button id="btnLogin">Entrar</button>
</div>

<div id="painel" style="display:none;">
  <h2>Painel de Eventos ⚙️</h2>

  <input type="tell" id="dia" placeholder="DD/MM/AAAA"  maxlength="10">
  <input id="evento" placeholder="Evento">
  <button id="btnCriar">Criar Evento</button>

  <div id="lista"></div>
  <button id="logout">Logout</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
