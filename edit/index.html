<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="Escala das Mídias - GMJ Loreto">
  <meta property="og:description" content="Se inscreva nos eventos de mídia da semana!">
  <meta property="og:image" content="https://gmjloreto.github.io/content-team-scheduler/assets/images/gmj_og_edit.png">
  <meta property="og:url" content="https://gmjloreto.github.io/content-team-scheduler/">
  <meta property="og:type" content="website">

  <link rel="icon" href="../assets/icons/favicon_edit.svg" type="image/svg+xml">
  <title>Escala GMJ - Editor</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin">

<div id="login">
  <h2>Login 🔐</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button id="btnLogin">Entrar</button>
</div>

<div id="painel" style="display:none;">
  <h2>Painel de Eventos ⚙️</h2>

  <input type="tell" id="dia" placeholder="Data do Evento (DD/MM/AAAA)" maxlength="10">
  <input id="evento" placeholder="Nome do Evento (Ex: Missa das 19h)">
  
  <h3 class="admin-subtitle" style="margin-top:20px; border:none; font-size:11px;">Briefing de Mídia 🎨</h3>
  <textarea id="descricao" placeholder="Ideia da arte / Briefing / Descrição" rows="3"></textarea>
  <input type="tell" id="data_postagem" placeholder="Data sugerida para postagem (DD/MM/AAAA)" maxlength="10">
  
  <button id="btnCriar">Criar Evento</button>

  <h3 class="admin-subtitle">Eventos Cadastrados</h3>
  <div id="lista"></div>
  <a href="../index.html" class="btn-publico">Ver Escala Pública 🌍</a>
  <button id="logout">Logout</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
